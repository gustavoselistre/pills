<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#D4537E" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Remédio" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <title>Remédio</title>
  <style>
    :root {
      --pink: #D4537E;
      --pink-light: #F4C0D1;
      --pink-bg: #FBEAF0;
      --pink-dark: #72243E;
      --pink-mid: #993556;
      --text: #1a1a1a;
      --text-muted: #666;
      --text-hint: #999;
      --bg: #fff;
      --surface: #f5f5f3;
      --border: rgba(0,0,0,0.1);
      --radius: 14px;
      --radius-sm: 8px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --text: #f0f0f0;
        --text-muted: #aaa;
        --text-hint: #666;
        --bg: #111;
        --surface: #1e1e1e;
        --border: rgba(255,255,255,0.1);
        --pink-bg: #2a1520;
        --pink-light: #4a1f2e;
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    body { padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); }

    .app { max-width: 420px; margin: 0 auto; padding: 24px 20px 40px; display: flex; flex-direction: column; gap: 20px; }

    .app-name { font-size: 12px; letter-spacing: 0.1em; color: var(--text-hint); text-align: center; text-transform: uppercase; }

    .hero-card {
      background: var(--pink-bg);
      border-radius: var(--radius);
      padding: 20px;
      text-align: center;
    }
    .hero-msg { font-size: 15px; color: var(--pink-dark); line-height: 1.65; min-height: 52px; }
    .hero-tag {
      display: inline-block;
      margin-top: 12px;
      font-size: 11px;
      color: var(--pink-mid);
      background: var(--pink-light);
      border-radius: 20px;
      padding: 3px 12px;
    }

    .btn-take {
      width: 100%;
      padding: 16px;
      border-radius: var(--radius);
      border: none;
      background: var(--pink);
      color: #fff;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: opacity .15s, transform .1s;
    }
    .btn-take:active { transform: scale(0.97); opacity: .85; }
    .btn-take.done {
      background: var(--surface);
      color: var(--text-muted);
      border: 1px solid var(--border);
    }
    .btn-take svg { width: 20px; height: 20px; }

    .streak-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .metric { background: var(--surface); border-radius: var(--radius-sm); padding: 14px; }
    .metric-label { font-size: 11px; color: var(--text-hint); margin-bottom: 4px; }
    .metric-val { font-size: 26px; font-weight: 500; color: var(--text); }
    .metric-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

    .section-label { font-size: 11px; font-weight: 500; color: var(--text-hint); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 10px; }

    .cal-day-labels { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; margin-bottom: 4px; }
    .cal-day-label { font-size: 10px; color: var(--text-hint); text-align: center; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
    .cal-day {
      aspect-ratio: 1;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: var(--text-hint);
      background: var(--surface);
      cursor: default;
    }
    .cal-day.taken { background: var(--pink-light); color: var(--pink-dark); font-weight: 500; }
    .cal-day.today { background: var(--pink); color: #fff; font-weight: 500; }
    .cal-day.future { opacity: 0.25; }

    .notif-section { display: flex; flex-direction: column; gap: 10px; }
    .notif-row { display: flex; align-items: center; justify-content: space-between; }
    .notif-label { font-size: 14px; color: var(--text); }
    .notif-sub { font-size: 12px; color: var(--text-muted); }
    .time-input {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 15px;
      padding: 8px 12px;
      cursor: pointer;
    }

    .btn-notif {
      width: 100%;
      padding: 13px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      font-size: 14px;
      cursor: pointer;
      transition: background .1s;
    }
    .btn-notif:hover { background: var(--surface); }

    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #222;
      color: #fff;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 13px;
      opacity: 0;
      transition: opacity .3s, transform .3s;
      pointer-events: none;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .install-banner {
      background: var(--pink-bg);
      border: 1px solid var(--pink-light);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      font-size: 13px;
      color: var(--pink-dark);
      line-height: 1.5;
      display: none;
    }
    .install-banner.visible { display: block; }
  </style>
</head>
<body>
<div class="app">
  <div class="app-name">lembrete</div>

  <div class="hero-card">
    <div class="hero-msg" id="hero-msg"></div>
    <div class="hero-tag" id="hero-tag"></div>
  </div>

  <button class="btn-take" id="take-btn" onclick="markTaken()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
    tomei hoje
  </button>

  <div class="streak-row">
    <div class="metric">
      <div class="metric-label">sequência</div>
      <div class="metric-val" id="streak-val">0</div>
      <div class="metric-sub">dias seguidos</div>
    </div>
    <div class="metric">
      <div class="metric-label">este mês</div>
      <div class="metric-val" id="month-val">0</div>
      <div class="metric-sub" id="month-sub">de 0 dias</div>
    </div>
  </div>

  <div>
    <div class="section-label" id="cal-title">carregando...</div>
    <div class="cal-day-labels">
      <div class="cal-day-label">D</div>
      <div class="cal-day-label">S</div>
      <div class="cal-day-label">T</div>
      <div class="cal-day-label">Q</div>
      <div class="cal-day-label">Q</div>
      <div class="cal-day-label">S</div>
      <div class="cal-day-label">S</div>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
  </div>

  <div class="notif-section">
    <div class="section-label">notificações</div>
    <div class="install-banner" id="install-banner">
      Para receber notificações, adicione o app à sua tela de início: toque em <strong>Compartilhar</strong> no Safari, depois <strong>Adicionar à Tela de Início</strong>.
    </div>
    <div class="notif-row">
      <div>
        <div class="notif-label">horário diário</div>
        <div class="notif-sub">notificação de lembrete</div>
      </div>
      <input type="time" class="time-input" id="notif-time" value="08:30" onchange="saveTime(this.value)" />
    </div>
    <button class="btn-notif" id="notif-btn" onclick="requestNotif()">ativar notificações</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="/app.js"></script>
</body>
</html>
